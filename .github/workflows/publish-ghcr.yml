name: Publish to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Exact semver without v (optional). Empty = auto bump patch."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Skip the bot's own "chore: release X.Y.Z" commits (VERSION bump push).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.event.head_commit.message, 'chore: release '))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve / auto-bump version
        id: ver
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < VERSION)"
          BUMPED=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "$VERSION" > VERSION
            BUMPED=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            VERSION_IN_PUSH=false
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              if git diff --name-only "$BEFORE" "$GITHUB_SHA" | grep -qx VERSION; then
                VERSION_IN_PUSH=true
              fi
            fi
            if [ "$VERSION_IN_PUSH" = true ]; then
              VERSION="$CURRENT"
              echo "VERSION already changed in this push — keep $VERSION"
            else
              MAJ="$(echo "$CURRENT" | cut -d. -f1)"
              MIN="$(echo "$CURRENT" | cut -d. -f2)"
              PAT="$(echo "$CURRENT" | cut -d. -f3 | sed 's/[^0-9].*//')"
              VERSION="${MAJ}.${MIN}.$((PAT + 1))"
              echo "$VERSION" > VERSION
              BUMPED=true
              echo "Auto-bumped VERSION $CURRENT → $VERSION"
            fi
          else
            # workflow_dispatch without input: bump patch from file
            MAJ="$(echo "$CURRENT" | cut -d. -f1)"
            MIN="$(echo "$CURRENT" | cut -d. -f2)"
            PAT="$(echo "$CURRENT" | cut -d. -f3 | sed 's/[^0-9].*//')"
            VERSION="${MAJ}.${MIN}.$((PAT + 1))"
            echo "$VERSION" > VERSION
            BUMPED=true
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$'; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          {
            echo "version=$VERSION"
            echo "major_minor=$MAJOR_MINOR"
            echo "bumped=$BUMPED"
            echo "is_main=true"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved APP_VERSION=$VERSION (bumped=$BUMPED)"

      - name: Build timestamp
        id: buildmeta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.major_minor }}
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit VERSION bump and git tag
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUMPED: ${{ steps.ver.outputs.bumped }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$BUMPED" = "true" ]; then
            git add VERSION
            if ! git diff --staged --quiet; then
              git commit -m "chore: release ${VERSION}"
              git push origin "HEAD:${GITHUB_REF_NAME}"
              echo "Pushed VERSION bump commit for ${VERSION}"
            fi
          fi

          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — skip"
          else
            git tag -a "${TAG}" -m "Release ${VERSION}"
            git push origin "${TAG}"
            echo "Created and pushed ${TAG}"
          fi
