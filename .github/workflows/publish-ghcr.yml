name: Publish to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (e.g. 1.0.1). Used only for manual runs."
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Resolve app version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$'; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          {
            echo "version=$VERSION"
            echo "major_minor=$MAJOR_MINOR"
            echo "is_main=${{ github.ref == 'refs/heads/main' }}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved APP_VERSION=$VERSION (main floating tag: ${{ github.ref == 'refs/heads/main' }})"

      - name: Build timestamp
        id: buildmeta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.major_minor }}
            type=raw,value=main,enable=${{ steps.ver.outputs.is_main }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # VDS is usually amd64; skip arm64 to keep CI faster/cheaper
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure git tag vX.Y.Z exists
        if: github.ref == 'refs/heads/main'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — skip"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${VERSION}"
          git push origin "${TAG}"
          echo "Created and pushed ${TAG}"
