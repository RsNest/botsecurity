services:
  bot:
    # deploy.sh sets BOT_IMAGE_TAG from VERSION after git pull (e.g. 1.0.4).
    # Fallback "main" is the latest CI build if .env has no pin yet.
    image: ghcr.io/rsnest/botsecurity:${BOT_IMAGE_TAG:-main}
    # Локальная отладка без GHCR: раскомментируй и закомментируй image выше
    # build: .
    container_name: botsecurity
    restart: unless-stopped
    # Match the host owner of ./data so an existing SQLite volume remains
    # writable while the image itself never needs to run as root.
    user: "${BOT_UID:-1000}:${BOT_GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./credentials.json:/app/credentials.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; assert Path('/app/data/botscan.db').exists()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
