[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 88
lint.select = ["F"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
files = [
  "bot/models.py",
  "bot/reports.py",
  "bot/sheets.py",
  "bot/storage.py",
  "bot/monitor.py",
]
